<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!--<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">-->
    
    <link rel="stylesheet" href="../css/styles.css" >
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-egg egg-icon mb-3"></i>
                <h3>Depot</h3>
                <h4>Login</h4>
            </div>
            <div class="login-body">

                <!--<div th:if="${param.error}" class="alert alert-danger mb-3">
                    <i class="fas fa-exclamation-triangle"></i>
                    Invalid username or password. Please try again.
                </div>
                <div th:if="${param.logout}" class="alert alert-success mb-3">
                    <i class="fas fa-check-circle"></i>
                    You have been logged out successfully.
                </div>-->
                
                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user"></i> Username
                        </label>
                        <input type="text" class="form-control" id="username" name="username" 
                               placeholder="Enter your username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="Enter your password" required>
                    </div>
                    
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember-me">
                            <label class="form-check-label" for="remember">Remember me</label>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-login">
                            <i class="fas fa-sign-in-alt"></i> Sign In
                        </button>
                        <a th:href="@{/register}" class="btn btn-outline-secondary">
                            <i class="fas fa-user-plus"></i> Register
                        </a>
                    </div>
                </form>
                
                <hr class="my-4">
                
                <div class="demo-accounts">
                    <h6 class="text-center mb-3">Demo Accounts</h6>
                    <div class="account-options">
                        <div class="account-option">
                            <strong>Admin Access:</strong> admin / admin123
                            <small class="text-success">(Full system control)</small>
                        </div>
                        <div class="account-option">
                            <strong>Customer Access:</strong> user / user123
                            <small class="text-info">(Browse & order)</small>
                        </div>
                        <div class="account-option">
                            <strong>Sample Customer:</strong> customer1 / customer123
                            <small class="text-warning">(Test customer features)</small>
                        </div>
                    </div>
                   
                </div>
            </div>
        </div>
    </div>
    
    <!--<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>-->
</body>
</html>
