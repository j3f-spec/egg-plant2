<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}">
    <title>My Profile - Egg Depot</title>
</head>

<body th:replace="~{layout :: body}">
    <div th:replace="~{layout :: title('My Profile')}"></div>
    <div th:replace="~{layout :: header}"></div>
    
    <div th:replace="~{layout :: content(~{:: .content})}">
        <div class="content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1><i class="fas fa-user-circle"></i> My Profile</h1>
                <button class="btn btn-primary">
                    <i class="fas fa-edit"></i> Edit Profile
                </button>
            </div>

            <div class="row">
                <!-- Profile Information -->
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-user"></i> Profile Information</h5>
                        </div>
                        <div class="card-body text-center">
                            <div class="mb-3">
                                <img src="https://via.placeholder.com/150x150?text=Profile" class="rounded-circle" alt="Profile" style="width: 150px; height: 150px;">
                            </div>
                            <h5 class="mt-3">John Smith</h5>
                            <p class="text-muted">john.smith@email.com</p>
                            <p class="text-muted">Member since: April 2024</p>
                            <div class="mt-3">
                                <span class="badge bg-success">Active</span>
                                <span class="badge bg-info">Verified</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Account Statistics -->
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-chart-bar"></i> Account Statistics</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <h6 class="text-primary">15</h6>
                                <p class="text-muted">Total Orders</p>
                            </div>
                            <div class="mb-3">
                                <h6 class="text-success">$342.50</h6>
                                <p class="text-muted">Total Spent</p>
                            </div>
                            <div class="mb-3">
                                <h6 class="text-info">4.8</h6>
                                <p class="text-muted">Average Rating</p>
                            </div>
                            <div class="mb-3">
                                <h6 class="text-warning">12</h6>
                                <p class="text-muted">Reviews Written</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-bolt"></i> Quick Actions</h5>
                        </div>
                        <div class="card-body">
                            <div class="d-grid gap-2">
                                <button class="btn btn-primary w-100">
                                    <i class="fas fa-shopping-cart"></i> Place Order
                                </button>
                                <button class="btn btn-success w-100">
                                    <i class="fas fa-box"></i> View Inventory
                                </button>
                                <button class="btn btn-info w-100">
                                    <i class="fas fa-history"></i> Order History
                                </button>
                                <button class="btn btn-warning w-100">
                                    <i class="fas fa-credit-card"></i> Payment Methods
                                </button>
                                <button class="btn btn-outline-primary w-100">
                                    <i class="fas fa-cog"></i> Settings
                                </button>
                                <button class="btn btn-outline-secondary w-100">
                                    <i class="fas fa-sign-out-alt"></i> Logout
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Detailed Information -->
            <div class="row mt-4">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-info-circle"></i> Contact Information</h5>
                        </div>
                        <div class="card-body">
                            <form>
                                <div class="mb-3">
                                    <label class="form-label">First Name</label>
                                    <input type="text" class="form-control" value="John" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Last Name</label>
                                    <input type="text" class="form-control" value="Smith" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" value="john.smith@email.com" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Phone</label>
                                    <input type="tel" class="form-control" value="+1-555-0101" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Address</label>
                                    <textarea class="form-control" rows="3" readonly>123 Main St, New York, NY 10001</textarea>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-cog"></i> Preferences</h5>
                        </div>
                        <div class="card-body">
                            <form>
                                <div class="mb-3">
                                    <label class="form-label">Language</label>
                                    <select class="form-select">
                                        <option value="en" selected>English</option>
                                        <option value="es">Spanish</option>
                                        <option value="fr">French</option>
                                        <option value="de">German</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Currency</label>
                                    <select class="form-select">
                                        <option value="USD" selected>USD ($)</option>
                                        <option value="EUR">EUR (€)</option>
                                        <option value="GBP">GBP (£)</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="notifications" checked>
                                        <label class="form-check-label" for="notifications">Email Notifications</label>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="newsletter">
                                        <label class="form-check-label" for="newsletter">Newsletter Subscription</label>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="autopay" checked>
                                        <label class="form-check-label" for="autopay">Auto-Pay Enabled</label>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Preferred Delivery</label>
                                    <select class="form-select">
                                        <option value="standard" selected>Standard Delivery</option>
                                        <option value="express">Express Delivery</option>
                                        <option value="pickup">Store Pickup</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-primary">Save Preferences</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
